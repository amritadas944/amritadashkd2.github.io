<!DOCTYPE html>
<html lang="en">
<head>

<title>Blue Serenity</title>
<style>
body{margin:0;font-family:Arial,sans-serif;background:linear-gradient(#bfe3ff,#fff);color:#234;text-align:center}

.gallery{display:grid;grid-template-columns:repeat(auto-fit,minmax(220px,1fr));gap:20px;padding:20px;max-width:1000px;margin:auto}
.card{background:#fff;border-radius:16px;padding:20px;box-shadow:0 4px 12px rgba(0,0,0,.15)}

</style>
</head>
<body>
<header>
<h1>Blue Serenity</h1>
<p>Welcome to my aesthetic website. Capturing peaceful skies, nature, and beautiful moments.</p>
</header>
<section class="gallery">
<div class="card"><h3>☁️ Blue Sky</h3><p>Peace begins when you look up.</p></div>
<div class="card"><h3>🌿 Nature</h3><p>Simple moments. Timeless memories.</p></div>
<div class="card"><h3>💙 Aesthetic</h3><p>Inspired by calm and creativity.</p></div>
</section>
<footer>Made with ❤️ by Amrita</footer>

</html>
